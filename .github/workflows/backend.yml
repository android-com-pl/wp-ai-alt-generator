name: Backend Checks

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
  pull_request:
    paths:
      - '**.php'

permissions:
  contents: read

jobs:
  backend:
    name: Run Backend Checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: 🐘 Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
        with:
          php-version: '8.1'
          coverage: none

      - name: 📦 Install PHP dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda
        with:
          require-lock-file: true
          composer-options: '--classmap-authoritative'

      - name: 🎨 Check formatting
        run: composer format:check

      - name: 🚨 Lint
        if: success() || failure()
        run: composer lint

      - name: 🔍 Analyse
        if: success() || failure()
        run: composer analyse
